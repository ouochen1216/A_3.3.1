<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>混亂錢包裡有多少錢？</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    @font-face {
      font-family: "BpmfZihiKaiStd";
      src: url("BpmfZihiKaiStd-Regular.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
      font-family: "BpmfZihiKaiStd", "Noto Sans TC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --danger: #dc2626;
      --success: #16a34a;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
      --radius-lg: 18px;
      --radius-md: 12px;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #e5edff 0, #eef2ff 40%, #f9fafb 100%);
      color: var(--text);
      font-size: 25px;
    }

    .wrapper {
      width: min(980px, 100% - 28px);
    }

    .panel {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 30px 28px 34px;
      box-shadow: var(--shadow);
    }

    .panel h1 {
      margin: 0 0 24px;
      font-size: 2.5rem;
      text-align: center;
      letter-spacing: 0.08em;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 30px;
      color: var(--muted);
      font-size: 1.15rem;
    }

    .btn-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      padding: 12px 28px;
      border-radius: 999px;
      font-size: 1.2rem;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      letter-spacing: 0.08em;
      transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.12s ease;
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.25);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .btn:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.32);
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: 0 6px 18px rgba(37, 99, 235, 0.2);
    }

    .btn.secondary {
      background: #e5e7eb;
      color: #111827;
      box-shadow: none;
      font-size: 1.05rem;
    }

    .btn.secondary:hover {
      background: #d1d5db;
      box-shadow: none;
    }

    .btn.danger {
      background: #ef4444;
      color: #fff;
      box-shadow: 0 10px 25px rgba(239, 68, 68, 0.22);
    }

    .btn.danger:hover {
      background: #dc2626;
      box-shadow: 0 14px 30px rgba(220, 38, 38, 0.28);
    }

    .hidden {
      display: none !important;
    }

    .game-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

    .topbar-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-left: auto;
    }

    .game-question {
      font-size: 1.8rem;
      font-weight: 600;
      text-align: center;
      letter-spacing: 0.14em;
      margin-top: 14px;
      margin-bottom: 20px;
    }

    .game-layout {
      display: flex;
      flex-direction: column;
      height: min(580px, 78vh);
      gap: 14px;
    }

    .top-area {
      flex: 7;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, #eef2ff, #e0f2fe);
      padding: 18px 20px;
    }

    .bottom-area {
      flex: 3;
      display: flex;
      gap: 16px;
    }

    .bottom-left {
      flex: 7;
      border-radius: var(--radius-md);
      background: #f9fafb;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
      border: 1px solid #e5e7eb;
    }

    .bottom-right {
      flex: 3;
      border-radius: var(--radius-md);
      background: #f9fafb;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 8px;
      border: 1px solid #e5e7eb;
    }

    .wallet-area {
      display: flex;
      align-items: center;
      gap: 30px;
      width: 100%;
      max-width: 740px;
    }

    .wallet-icon {
      flex-shrink: 0;
      width: 230px;
      height: 170px;
      background-image: url("wallet.png");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }

    .money-list {
      flex: 1;
      display: flex;
      gap: 24px;
    }

    .money-column {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .money-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .note-icon {
      min-width: 110px;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      text-align: center;
      font-size: 25px;
      margin-right: 10px;
      background: #ffffff;
      line-height: 1.2;
    }

    .note-1000 { background: #dbeafe; border-color: #93c5fd; }
    .note-100  { background: #fecaca; border-color: #f87171; }
    .note-10   { background: #e5e7eb; border-color: #9ca3af; }
    .note-1    { background: #fed7aa; border-color: #f97316; }

    .money-count {
      font-size: 1.3rem;
      font-weight: 700;
      color: #111827;
      min-width: 80px;
    }

    .answer-label {
      font-weight: 700;
      letter-spacing: 0.22em;
      text-indent: 0.22em;
      font-size: 1.4rem;
    }

    .answer-inputs {
      display: flex;
      gap: 10px;
    }

    .digit-input {
      width: 58px;
      height: 62px;
      border-radius: 14px;
      border: 2px solid #d1d5db;
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      outline: none;
      background: #ffffff;
      transition: border 0.12s ease, box-shadow 0.12s ease, transform 0.08s ease;
    }

    .digit-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
      transform: translateY(-1px);
    }

    .answer-unit {
      font-weight: 700;
      margin-left: 6px;
      font-size: 1.4rem;
    }

    .answer-main {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 18px;
      flex-wrap: wrap;
    }

    .answer-group {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .timer-label {
      font-size: 1.15rem;
      color: var(--muted);
      letter-spacing: 0.3em;
      text-indent: 0.3em;
    }

    .timer-value {
      font-size: 2.2rem;
      font-weight: 800;
    }

    .timer-value span {
      font-feature-settings: "tnum" 1, "lnum" 1;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }

    .modal {
      background: #f9fafb;
      border-radius: 20px;
      padding: 24px 24px 20px;
      width: min(420px, 86%);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .modal p {
      margin: 0 0 14px;
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .modal .small {
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .result-message {
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-indent: 0.12em;
      margin-bottom: 6px;
    }

    .result-correct {
      color: var(--success);
    }

    .result-wrong {
      color: var(--danger);
    }

    .record-modal {
      background: #ffffff;
      border-radius: 20px;
      padding: 22px;
      width: min(900px, 94vw);
      max-height: 86vh;
      overflow: auto;
      box-shadow: var(--shadow);
    }

    .record-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .record-title {
      font-size: 1.6rem;
      font-weight: 700;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px 16px;
    }

    .stat-label {
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #111827;
    }

    .record-subtitle {
      font-size: 1.2rem;
      font-weight: 700;
      margin: 14px 0 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      border: 1px solid #e5e7eb;
      padding: 10px 8px;
      text-align: center;
      vertical-align: middle;
      font-size: 0.92rem;
    }

    th {
      background: #f3f4f6;
      font-weight: 700;
    }

    .record-empty {
      color: var(--muted);
      background: #f9fafb;
      border: 1px dashed #d1d5db;
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      font-size: 1rem;
    }

    .status-correct {
      color: var(--success);
      font-weight: 700;
    }

    .status-wrong {
      color: var(--danger);
      font-weight: 700;
    }

    @media (max-width: 720px) {
      .panel {
        padding: 22px 16px 26px;
      }

      .wallet-area {
        flex-direction: column;
        align-items: center;
      }

      .wallet-icon {
        width: 210px;
        height: 150px;
      }

      .money-list {
        flex-direction: column;
        gap: 10px;
      }

      .game-layout {
        height: auto;
      }

      .bottom-area {
        flex-direction: column;
        height: auto;
      }

      .answer-main {
        flex-direction: column;
        align-items: flex-start;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      th, td {
        font-size: 0.84rem;
        padding: 8px 6px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div id="startScreen" class="panel">
      <h1>混亂錢包裡有多少錢？</h1>
      <p class="subtitle">看看你能不能在時間內，算出錢包裡一共有多少錢。</p>
      <div class="btn-row">
        <button id="startBtn" class="btn">開始遊戲</button>
        <button id="openRecordBtnStart" class="btn secondary">遊戲紀錄</button>
      </div>
    </div>

    <div id="gameScreen" class="panel hidden">
      <div class="game-topbar">
        <div></div>
        <div class="topbar-right">
          <button id="openRecordBtnGame" class="btn secondary">遊戲紀錄</button>
          <button id="exitBtn" class="btn danger">離開遊戲</button>
        </div>
      </div>

      <div class="game-question">數一數，錢包裡面有多少錢？</div>

      <div class="game-layout">
        <div class="top-area">
          <div class="wallet-area">
            <div class="wallet-icon" aria-label="錢包圖案"></div>

            <div class="money-list">
              <div class="money-column">
                <div class="money-row">
                  <div class="note-icon note-1000">1000 元</div>
                  <div class="money-count" id="count1000">x 0</div>
                </div>
                <div class="money-row">
                  <div class="note-icon note-100">100 元</div>
                  <div class="money-count" id="count100">x 0</div>
                </div>
              </div>
              <div class="money-column">
                <div class="money-row">
                  <div class="note-icon note-10">10 元</div>
                  <div class="money-count" id="count10">x 0</div>
                </div>
                <div class="money-row">
                  <div class="note-icon note-1">1 元</div>
                  <div class="money-count" id="count1">x 0</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="bottom-area">
          <div class="bottom-left">
            <div class="answer-main">
              <div class="answer-group">
                <div class="answer-label">答案</div>
                <div class="answer-inputs">
                  <input id="d1000" class="digit-input" type="text" inputmode="numeric" maxlength="1" aria-label="千位">
                  <input id="d100" class="digit-input" type="text" inputmode="numeric" maxlength="1" aria-label="百位">
                  <input id="d10" class="digit-input" type="text" inputmode="numeric" maxlength="1" aria-label="十位">
                  <input id="d1" class="digit-input" type="text" inputmode="numeric" maxlength="1" aria-label="個位">
                </div>
                <div class="answer-unit">元</div>
              </div>

              <button id="submitBtn" class="btn secondary">送出答案</button>
            </div>
          </div>

          <div class="bottom-right">
            <div class="timer-label">計時器</div>
            <div class="timer-value"><span id="timer">0</span> 秒</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="resultModalBackdrop" class="modal-backdrop hidden" style="display:none;">
    <div class="modal">
      <p id="modalMessage" class="result-message"></p>
      <p id="modalDetail" class="small"></p>
      <button id="nextBtn" class="btn secondary">下一題</button>
    </div>
  </div>

  <div id="recordModalBackdrop" class="modal-backdrop hidden" style="display:none;">
    <div class="record-modal">
      <div class="record-header">
        <div class="record-title">遊戲紀錄</div>
        <button id="closeRecordBtn" class="btn secondary">關閉</button>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">最高連續答對</div>
          <div class="stat-value" id="bestStreakValue">0 題</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">最快答對時間</div>
          <div class="stat-value" id="fastestCorrectValue">--</div>
        </div>
      </div>

      <div class="record-subtitle">近五次答題紀錄</div>
      <div id="recordTableWrap"></div>
    </div>
  </div>

  <script>
    let count1000 = 0;
    let count100 = 0;
    let count10 = 0;
    let count1 = 0;
    let totalAmount = 0;

    let timer = 0;
    let timerId = null;

    let currentStreak = 0;
    let bestStreak = 0;
    let fastestCorrectTime = null;
    let recentRecords = [];

    const digitIds = ["d1000", "d100", "d10", "d1"];

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function buildQuestionText() {
      return `${count1000}張1000元、${count100}張100元、${count10}個10元、${count1}個1元`;
    }

    function resetInputs() {
      digitIds.forEach(id => {
        document.getElementById(id).value = "";
      });
    }

    function generateQuestion() {
      resetInputs();

      count1000 = randomInt(1, 9);
      count100 = randomInt(0, 9);
      count10 = randomInt(0, 9);
      count1 = randomInt(0, 9);

      totalAmount = count1000 * 1000 + count100 * 100 + count10 * 10 + count1;

      document.getElementById("count1000").textContent = "x " + count1000;
      document.getElementById("count100").textContent = "x " + count100;
      document.getElementById("count10").textContent = "x " + count10;
      document.getElementById("count1").textContent = "x " + count1;

      resetTimer();
      startTimer();
      document.getElementById("d1000").focus();
    }

    function resetTimer() {
      if (timerId !== null) clearInterval(timerId);
      timer = 0;
      document.getElementById("timer").textContent = timer;
    }

    function startTimer() {
      if (timerId !== null) clearInterval(timerId);
      timerId = setInterval(() => {
        timer++;
        document.getElementById("timer").textContent = timer;
      }, 1000);
    }

    function stopTimer() {
      if (timerId !== null) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function getUserAnswer() {
      const digits = digitIds.map(id => document.getElementById(id).value.trim());

      if (digits.some(v => v === "")) return NaN;

      const nums = digits.map(v => parseInt(v, 10));
      if (nums.some(n => Number.isNaN(n))) return NaN;

      return nums[0] * 1000 + nums[1] * 100 + nums[2] * 10 + nums[3];
    }

    function openResultModal(message, detail, status) {
      const backdrop = document.getElementById("resultModalBackdrop");
      const msgEl = document.getElementById("modalMessage");

      msgEl.textContent = message;
      msgEl.classList.remove("result-correct", "result-wrong");

      if (status === "correct") msgEl.classList.add("result-correct");
      if (status === "wrong") msgEl.classList.add("result-wrong");

      document.getElementById("modalDetail").textContent = detail || "";
      backdrop.classList.remove("hidden");
      backdrop.style.display = "flex";
    }

    function closeResultModal() {
      const el = document.getElementById("resultModalBackdrop");
      el.classList.add("hidden");
      el.style.display = "none";
    }

    function saveRecord({ question, userAnswer, correctAnswer, questionTime, isCorrect }) {
      recentRecords.unshift({
        question,
        userAnswer,
        correctAnswer,
        questionTime,
        isCorrect
      });

      if (recentRecords.length > 5) {
        recentRecords = recentRecords.slice(0, 5);
      }
    }

    function updateStatsOnAnswer(isCorrect, questionTime) {
      if (isCorrect) {
        currentStreak++;
        if (currentStreak > bestStreak) bestStreak = currentStreak;
        if (fastestCorrectTime === null || questionTime < fastestCorrectTime) {
          fastestCorrectTime = questionTime;
        }
      } else {
        currentStreak = 0;
      }
    }

    function renderRecordModal() {
      document.getElementById("bestStreakValue").textContent = `${bestStreak} 題`;
      document.getElementById("fastestCorrectValue").textContent =
        fastestCorrectTime === null ? "--" : `${fastestCorrectTime} 秒`;

      const wrap = document.getElementById("recordTableWrap");

      if (recentRecords.length === 0) {
        wrap.innerHTML = `<div class="record-empty">目前還沒有答題紀錄。</div>`;
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th>結果</th>
              <th>題目</th>
              <th>你的答案</th>
              <th>正確答案</th>
              <th>答題時間</th>
            </tr>
          </thead>
          <tbody>
      `;

      recentRecords.forEach(item => {
        html += `
          <tr>
            <td class="${item.isCorrect ? 'status-correct' : 'status-wrong'}">
              ${item.isCorrect ? '答對' : '答錯'}
            </td>
            <td>${item.question}</td>
            <td>${item.userAnswer}</td>
            <td>${item.correctAnswer} 元</td>
            <td>${item.questionTime} 秒</td>
          </tr>
        `;
      });

      html += `</tbody></table>`;
      wrap.innerHTML = html;
    }

    function openRecordModal() {
      renderRecordModal();
      const el = document.getElementById("recordModalBackdrop");
      el.classList.remove("hidden");
      el.style.display = "flex";
    }

    function closeRecordModal() {
      const el = document.getElementById("recordModalBackdrop");
      el.classList.add("hidden");
      el.style.display = "none";
    }

    function goToStartScreen() {
      stopTimer();
      closeResultModal();
      closeRecordModal();
      currentStreak = 0;

      document.getElementById("gameScreen").classList.add("hidden");
      document.getElementById("startScreen").classList.remove("hidden");
    }

    function startGame() {
      closeResultModal();
      closeRecordModal();

      document.getElementById("startScreen").classList.add("hidden");
      document.getElementById("gameScreen").classList.remove("hidden");

      currentStreak = 0;
      generateQuestion();
    }

    function handleSubmit() {
      const userAns = getUserAnswer();

      if (Number.isNaN(userAns)) {
        openResultModal("還沒填完喔。", "請把四個位數都填上 0–9 的數字，再送出答案。", "info");
        return;
      }

      stopTimer();

      const isCorrect = userAns === totalAmount;

      updateStatsOnAnswer(isCorrect, timer);
      saveRecord({
        question: buildQuestionText(),
        userAnswer: `${userAns} 元`,
        correctAnswer: totalAmount,
        questionTime: timer,
        isCorrect
      });

      if (isCorrect) {
        openResultModal("答對了！", `你花了 ${timer} 秒。`, "correct");
      } else {
        openResultModal("答錯了。", `正確答案是 ${totalAmount} 元，下次再想一想。`, "wrong");
      }
    }

    function setupDigitInputs() {
      digitIds.forEach((id, index) => {
        const input = document.getElementById(id);

        input.addEventListener("input", (e) => {
          let value = e.target.value.replace(/\D/g, "");
          if (value.length > 1) value = value.slice(-1);
          e.target.value = value;

          if (value.length === 1) {
            const nextId = digitIds[index + 1];
            if (nextId) document.getElementById(nextId).focus();
          }
        });

        input.addEventListener("keydown", (e) => {
          if (e.key === "Backspace" && input.value === "") {
            const prevId = digitIds[index - 1];
            if (prevId) document.getElementById(prevId).focus();
          } else if (e.key === "Enter") {
            handleSubmit();
          }
        });
      });
    }

    document.getElementById("startBtn").addEventListener("click", startGame);
    document.getElementById("submitBtn").addEventListener("click", handleSubmit);

    document.getElementById("nextBtn").addEventListener("click", () => {
      closeResultModal();
      generateQuestion();
    });

    document.getElementById("exitBtn").addEventListener("click", goToStartScreen);

    document.getElementById("openRecordBtnStart").addEventListener("click", openRecordModal);
    document.getElementById("openRecordBtnGame").addEventListener("click", openRecordModal);
    document.getElementById("closeRecordBtn").addEventListener("click", closeRecordModal);

    window.addEventListener("beforeunload", () => {
      stopTimer();
    });

    setupDigitInputs();
  </script>
</body>
</html>
